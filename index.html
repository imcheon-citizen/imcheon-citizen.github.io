<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- 검색 엔진 차단 설정 -->
    <meta name="robots" content="noindex, nofollow">
    <title>IMCHEON-CITIZEN ACCESS</title>
    <link href="https://fonts.googleapis.com/css2?family=Nanum+Square+Round:wght@800&family=Roboto+Mono:wght@300;700;900&display=swap" rel="stylesheet">
    <style>
    /* 1. 전체 화면 정중앙 배치 설정 */
    body { 
        background-color: #0a0a0a; 
        color: #ff1a1a; 
        font-family: 'Nanum Square Round', sans-serif; 
        display: flex; 
        flex-direction: column;
        justify-content: center; /* 세로 정중앙 */
        align-items: center;    /* 가로 정중앙 */
        height: 100vh;          /* 모바일에서도 화면 꽉 차게 */
        margin: 0; 
        text-align: center; 
        overflow: hidden;
        background-image: radial-gradient(circle, #1a0505 0%, #0a0a0a 100%);
    }

    /* 2. 로그인 박스 - 비율 기반으로 수정 */
    .login-box { 
        border: 1px solid rgba(255, 26, 26, 0.5); 
        padding: 40px 20px; /* 고정값 대신 적절한 여백 */
        border-radius: 5px; 
        box-shadow: 0 0 30px rgba(255, 0, 0, 0.15), inset 0 0 15px rgba(255, 0, 0, 0.1); 
        width: 85%;          /* 모바일에서 좌우 여백 확보 */
        max-width: 400px;    /* PC에서도 너무 퍼지지 않게 */
        background: rgba(0, 0, 0, 0.8);
        box-sizing: border-box; /* 패딩이 너비에 포함되도록 */
    }

    .warning-top {
        font-family: 'Roboto Mono', monospace;
        font-size: 0.85em;
        letter-spacing: 6px;
        color: #ff1a1a;
        margin-bottom: 10px;
        text-shadow: 0 0 5px #ff0000;
    }

    .target-text { 
        font-weight: 800; 
        font-size: 1.6em; 
        letter-spacing: 1px; 
        margin-bottom: 30px; 
        color: #ff1a1a; 
        text-shadow: 0 0 12px rgba(255, 0, 0, 0.8); 
    }

    input { 
        background: #000; 
        border: 1px solid #440000; 
        color: #ff1a1a; 
        padding: 14px; 
        text-align: center; 
        outline: none; 
        width: 90%; 
        font-size: 16px; 
        border-radius: 3px;
        font-family: 'Roboto Mono', monospace;
    }

    button { 
        background: #7a0000; 
        border: 1px solid #ff1a1a; 
        color: #fff; 
        padding: 12px; 
        cursor: pointer; 
        font-weight: bold; 
        margin-top: 20px; 
        width: 90%; 
        font-size: 1em; 
        letter-spacing: 2px;
    }

    /* 3. 실패 오버레이 - 세로/가로 정중앙 */
    #fail-overlay {
        display: none;
        position: fixed;
        top: 0; left: 0; width: 100%; height: 100%;
        background: rgba(0, 0, 0, 0.96);
        z-index: 999;
        justify-content: center; /* 자식 요소 가로 중앙 */
        align-items: center;    /* 자식 요소 세로 중앙 */
        backdrop-filter: blur(5px);
    }

    .fail-box {
        text-align: center;
        /* [복구] 더 선명한 빨간색 네온 테두리 */
        border: 2px solid #ff1a1a;
        padding: 40px 30px;
        border-radius: 10px;
        /* [복구] 안팎으로 퍼지는 강력한 네온 광채 */
        box-shadow: 0 0 25px rgba(255, 0, 0, 0.7), inset 0 0 15px rgba(255, 0, 0, 0.5);
        background: rgba(10, 0, 0, 0.95);
        width: 85%;
        max-width: 320px;
        box-sizing: border-box;
        /* [복구] 나타날 때 좌우로 흔들리는 효과 */
        animation: shake 0.4s ease-in-out;
    }

    /* [복구] 흔들림 애니메이션 효과 */
    @keyframes shake {
        0%, 100% { transform: translateX(0); }
        25% { transform: translateX(-10px); }
        75% { transform: translateX(10px); }
    }

    /* 4. 암호 통과 후 타이핑 텍스트 구역 - 정중앙 */
    #content { 
        display: none; /* JS에서 flex로 변경될 예정 */
        flex-direction: column;
        justify-content: center;
        align-items: center;
        width: 100%;
        height: 100%;
    }
</style>
</head>
<body>

<!-- 1. 로그인 박스 구역 -->
<div id="login-container" class="login-box">
    <div style="font-family: 'Roboto Mono', monospace; font-size: 0.85em; letter-spacing: 6px; color: #ff1a1a; margin-bottom: 10px;">≪ WARNING ≫</div>
    <div style="font-weight: 800; font-size: 1.6em; letter-spacing: 1px; margin-bottom: 35px; color: #ff1a1a; text-shadow: 0 0 12px rgba(255, 0, 0, 0.8);">최고 구금 목표 침입 경고</div>
    <input type="password" id="pw-input" placeholder="ACCESS CODE" autocomplete="off" style="background: #000; border: 1px solid #440000; color: #ff1a1a; padding: 14px; text-align: center; outline: none; width: 90%; font-size: 16px; border-radius: 3px;">
    <button onclick="checkPw()" style="background: #7a0000; border: 1px solid #ff1a1a; color: #fff; padding: 12px; cursor: pointer; font-weight: bold; margin-top: 20px; width: 90%; font-size: 1em; letter-spacing: 2px;">ACCESS</button>
</div>

<!-- 2. 암호 통과 후 나타날 타이핑 구역 -->
<div id="content">
    <div id="typing-text" style="color: #ffffff; font-family: 'Nanum Square Round', sans-serif; font-weight: 300; font-size: 1.3em; letter-spacing: 1.5px; text-shadow: 0 0 8px rgba(255,255,255,0.4); width: 90%; max-width: 500px; word-break: keep-all; line-height: 1.6;"></div>
</div>

<!-- 3. 실패 화면 구역 -->
<div id="fail-overlay" onclick="closeFail()">
    <div style="text-align: center;">
        <div style="font-family: 'Roboto Mono', monospace; font-weight: 900; font-size: 2em; color: #ff1a1a; text-shadow: 0 0 20px #ff0000;">TARGET LOST</div>
        <div style="font-size: 2.5em; font-weight: 800; color: #ff1a1a; text-shadow: 0 0 15px #ff0000; margin: 0;">검거 ⚠ 실패</div>
        <div style="margin-top: 20px; font-size: 0.9em; color: #880000; letter-spacing: 1px;">목표가 시공간 좌표에서 도주했습니다</div>
    </div>
</div>

<script>
    // 글자를 한 글자씩 출력하는 기능
    function typeWriter(text, elementId, speed) {
        let i = 0;
        const element = document.getElementById(elementId);
        element.innerHTML = ""; 
        
        function type() {
            if (i < text.length) {
                element.innerHTML += text.charAt(i);
                i++;
                setTimeout(type, speed);
            }
        }
        type();
    }

    // 암호 확인 기능
    function checkPw() {
        const pw = document.getElementById("pw-input").value;
        if (pw === "0130") {
            document.getElementById("login-container").style.display = "none";
            const content = document.getElementById("content");
            content.style.display = "flex"; // 중앙 정렬을 위해 flex로 변경
            document.body.style.background = "#050505";
            
            typeWriter("이번엔 나한테 쉽게 잡히지 마.", "typing-text", 120);
        } else {
            document.getElementById("fail-overlay").style.display = "flex";
        }
    }

    // 실패 창 닫기
    function closeFail() {
        document.getElementById("fail-overlay").style.display = "none";
        document.getElementById("pw-input").value = "";
        document.getElementById("pw-input").focus();
    }

    // 엔터키 지원
    document.getElementById("pw-input").addEventListener("keyup", function(event) {
        if (event.key === "Enter") checkPw();
    });
</script>

</body>
</html>
