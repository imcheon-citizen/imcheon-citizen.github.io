<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- 검색 엔진 차단 설정 -->
    <meta name="robots" content="noindex, nofollow">
    <title>IMCHEON-CITIZEN ACCESS</title>
    <link href="https://fonts.googleapis.com/css2?family=Nanum+Square+Round:wght@800&family=Roboto+Mono:wght@300;700;900&display=swap" rel="stylesheet">
    <style>
        body { 
            background-color: #0a0a0a; 
            color: #ff1a1a; 
            font-family: 'Nanum Square Round', sans-serif; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            height: 100vh; 
            margin: 0; 
            text-align: center; 
            overflow: hidden;
            background-image: radial-gradient(circle, #1a0505 0%, #0a0a0a 100%);
        }
        
        /* 로그인 박스 - 네온 효과 강화 */
        .login-box { 
    border: 1px solid rgba(255, 26, 26, 0.5); 
    padding: 50px 30px; 
    border-radius: 5px; 
    box-shadow: 0 0 30px rgba(255, 0, 0, 0.15), inset 0 0 15px rgba(255, 0, 0, 0.1); 
    width: 90%;          /* 모바일 너비 최적화 */
    max-width: 450px;    /* PC 최대 너비 제한 */
    background: rgba(0, 0, 0, 0.8);
    position: relative;
}

        /* 이미지의 상단 WARNING 느낌 재현 */
        .warning-top {
            font-family: 'Roboto Mono', monospace;
            font-size: 0.85em;
            font-weight: 300;
            letter-spacing: 6px;
            color: #ff1a1a;
            margin-bottom: 10px;
            text-shadow: 0 0 5px #ff0000;
        }

        .target-text { 
            font-weight: 800; 
            font-size: 1.6em; 
            letter-spacing: 1px; 
            margin-bottom: 35px; 
            color: #ff1a1a; 
            text-shadow: 0 0 12px rgba(255, 0, 0, 0.8); 
        }

        input { 
            background: #000; 
            border: 1px solid #440000; 
            color: #ff1a1a; 
            padding: 14px; 
            text-align: center; 
            outline: none; 
            width: 90%; 
            font-size: 16px; 
            margin-top: 10px; 
            border-radius: 3px;
            transition: 0.3s;
            font-family: 'Roboto Mono', monospace;
        }
        input:focus { border-color: #ff1a1a; box-shadow: 0 0 10px rgba(255, 0, 0, 0.3); }

        button { 
            background: #7a0000; 
            border: 1px solid #ff1a1a; 
            color: #fff; 
            padding: 12px; 
            cursor: pointer; 
            font-weight: bold; 
            margin-top: 20px; 
            width: 90%; 
            font-size: 1em; 
            letter-spacing: 2px;
            transition: 0.3s;
        }
        button:hover { background: #ff1a1a; color: #000; box-shadow: 0 0 15px #ff1a1a; }

        /* 실패 오버레이 - 보내주신 이미지 느낌 */
        #fail-overlay {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.96);
            z-index: 999;
            justify-content: center;
            align-items: center;
            backdrop-filter: blur(5px);
        }
      .fail-box {
            text-align: center;
            animation: shake 0.4s ease-in-out;
            /* [수정] 네온 테두리 추가 */
            border: 2px solid #ff1a1a;
            padding: 40px 30px;
            border-radius: 10px;
            box-shadow: 0 0 20px rgba(255, 0, 0, 0.6), inset 0 0 10px rgba(255, 0, 0, 0.4);
            background: rgba(10, 0, 0, 0.9);
            width: 320px; /* 박스 크기 고정 */
        }
        .fail-eng {
            font-family: 'Roboto Mono', monospace;
            font-weight: 900;
            font-size: 2em; /* 크기 살짝 조정 */
            letter-spacing: 2px;
            color: #ff1a1a;
            text-shadow: 0 0 20px #ff0000;
            margin-bottom: -10px; /* [수정] 아래 글자와의 간격을 좁힘 */
        }
        .fail-kor {
            font-size: 2.5em; /* 크기 살짝 조정 */
            font-weight: 800;
            margin: 0; /* [수정] 위아래 여백을 없애서 밀착 */
            color: #ff1a1a;
            text-shadow: 0 0 15px #ff0000;
        }
        .fail-desc { margin-top: 20px; font-size: 0.9em; color: #880000; letter-spacing: 1px; }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-10px); }
            75% { transform: translateX(10px); }
        }

        /* 메인 콘텐츠 영역 (로그인 후) */
        #content { display: none; padding: 40px; }
    </style>
</head>
<body>

<div id="login-container" class="login-box">
    <div class="warning-top">≪ WARNING ≫</div>
    <div class="target-text">최고 구금 목표 침입 경고</div>
    <input type="password" id="pw-input" placeholder="ACCESS CODE" autocomplete="off">
    <button onclick="checkPw()">ACCESS</button>
</div>

<div id="fail-overlay" onclick="closeFail()">
    <div class="fail-box">
        <div class="fail-eng">TARGET LOST</div>
        <div class="fail-kor">검거 ⚠ 실패</div>
        <div class="fail-desc">목표가 시공간 좌표에서 도주했습니다</div>
    </div>
</div>
<!-- 여기서부터 끝까지 덮어쓰기 하세요 -->
<div id="content" style="display:none; text-align: center; padding-top: 15vh;">
    <!-- 진운의 대사만 깔끔하게 출력 -->
    <div id="typing-text" style="color: #ffffff; font-family: 'Nanum Square Round', sans-serif; font-weight: 300; font-size: 1.3em; letter-spacing: 1.5px; min-height: 1.5em; text-shadow: 0 0 8px rgba(255,255,255,0.4);"></div>
</div>

<script>
    function typeWriter(text, elementId, speed) {
        let i = 0;
        const element = document.getElementById(elementId);
        element.innerHTML = ""; 
        
        function type() {
            if (i < text.length) {
                element.innerHTML += text.charAt(i);
                i++;
                setTimeout(type, speed);
            } else {
                // 타이핑이 끝난 후 1.5초 뒤에 다음 페이지로 이동
                setTimeout(() => {
                    // 지금은 이동할 페이지가 없으므로 알림창만 띄우거나 아래처럼 주석 처리합니다.
                    // window.location.href = "main.html"; 
                    console.log("메인 페이지로 이동 준비 완료");
                }, 1500);
            }
        }
        type();
    }

    function checkPw() {
        const pw = document.getElementById("pw-input").value;
        if (pw === "0130") {
            document.getElementById("login-container").style.display = "none";
            document.getElementById("content").style.display = "block";
            document.body.style.background = "#050505";
            
            // 진운의 대사 타이핑 시작
            typeWriter("이번엔 나한테 쉽게 잡히지 마.", "typing-text", 130);
        } else {
            document.getElementById("fail-overlay").style.display = "flex";
        }
    }

    function closeFail() {
        document.getElementById("fail-overlay").style.display = "none";
        document.getElementById("pw-input").value = "";
        document.getElementById("pw-input").focus();
    }

    document.getElementById("pw-input").addEventListener("keyup", function(event) {
        if (event.key === "Enter") checkPw();
    });
</script>

</body>
</html>
